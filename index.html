<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horarios Compartidos en la Nube</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Horarios Universitarios ☁️</h1>
        
        <div class="card">
            <h2>1. Ingresar Mi Horario</h2>
            <div class="form-group">
                <input type="text" id="nombre" placeholder="Tu nombre (ej. Daniela)">
            </div>
            <p class="instruccion">Escribe el nombre de tu clase. Si solo quieres marcarlo como ocupado, pon una "X".</p>
            
            <div class="table-responsive">
                <table id="tabla-ingreso"></table>
            </div>
            <button id="btn-guardar" class="btn-primary" style="margin-top: 15px; width: 100%;">Guardar en la nube</button>
        </div>

        <div class="card">
            <h2>2. Navegador de Horarios</h2>
            <p class="instruccion">Selecciona a alguien para ver su horario completo:</p>
            <div class="form-group">
                <select id="selector-ver-horario">
                    <option value="">-- Elige un horario --</option>
                </select>
            </div>
            <div class="table-responsive" id="contenedor-horario-individual"></div>
            <button id="btn-borrar" class="btn-danger">Borrar Todos los Datos de la Nube</button>
        </div>

        <div class="card">
            <h2>3. Encontrar Huecos Libres</h2>
            <p class="instruccion">Selecciona a las personas que quieres cruzar:</p>
            <div id="selector-comparacion" class="checkbox-group"></div>
            <button id="btn-comparar">Buscar Horas en Común</button>
            
            <div id="resultados" class="resultados"></div>
        </div>
    </div>
    
    <!-- ES VITAL QUE DIGA type="module" -->
    <script type="module" src="script.js"></script>
</body>
</html>
